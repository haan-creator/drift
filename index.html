var adj={q:["w","a"],w:["q","e","a","s"],e:["w","r","s","d"],r:["e","t","d","f"],t:["r","y","f","g"],y:["t","u","g","h"],u:["y","i","h","j"],i:["u","o","j","k"],o:["i","p","k","l"],p:["o","l"],a:["q","w","s","z"],s:["a","w","e","d","z","x"],d:["s","e","r","f","x","c"],f:["d","r","t","g","c","v"],g:["f","t","y","h","v","b"],h:["g","y","u","j","b","n"],j:["h","u","i","k","n","m"],k:["j","i","o","l","m"],l:["k","o","p"],z:["a","s","x"],x:["z","s","d","c"],c:["x","d","f","v"],v:["c","f","g","b"],b:["v","g","h","n"],n:["b","h","j","m"],m:["n","j","k"]};
var byOriginal={};
DRIFT_DATA.forEach(function(d){if(!byOriginal[d.original])byOriginal[d.original]=[];byOriginal[d.original].push(d);});
var trail=[];
var fetchControllers={extract:null,img:null};

// 敏感詞條黑名單（drift 目標或 title 包含以下內容時跳過）
var BLOCKED_DRIFTS=["gook","shit","slut","milf","kike","cunt","fuck","poop","feck","poof","rape"];
var BLOCKED_TITLE_KEYWORDS=["racial slur","ethnic slur","profanity","sexual","pornograph","derogatory"];

function isSafeEntry(entry){
  if(!entry)return false;
  var d=entry.drift.toLowerCase();
  for(var i=0;i<BLOCKED_DRIFTS.length;i++){if(d===BLOCKED_DRIFTS[i])return false;}
  var t=(entry.title||"").toLowerCase();
  for(var i=0;i<BLOCKED_TITLE_KEYWORDS.length;i++){if(t.indexOf(BLOCKED_TITLE_KEYWORDS[i])>=0)return false;}
  return true;
}

function escH(s){if(!s)return"";return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function seededRng(seed){var h=0;for(var i=0;i<seed.length;i++)h=((h<<5)-h+seed.charCodeAt(i))|0;return function(){h=(h*16807)%2147483647;return(h&0x7fffffff)/0x7fffffff;};}

function computeStep(current,rng){var chars=current.split("");var pos=Math.floor(rng()*chars.length);var ch=chars[pos];if(adj[ch]){var nb=adj[ch];var nc=nb[Math.floor(rng()*nb.length)];chars[pos]=nc;return{from:current,to:chars.join(""),pos:pos,old:ch,"new":nc};}return null;}

function startDrift(){
var word=document.getElementById("inp").value.trim().toLowerCase().replace(/[^a-z]/g,"");
if(word.length<2)return;
document.getElementById("hint").style.display="none";
document.getElementById("btnArea").innerHTML='<div class="status"><span class="blinker"></span>DRIFTING...</div>';

var rng=seededRng(word);
var maxSteps=Math.min(4,Math.max(2,Math.ceil(word.length/2)));
var steps=[];
var current=word;
for(var i=0;i<maxSteps;i++){var step=computeStep(current,rng);if(step){steps.push(step);current=step.to;}}

var hitIndex=-1;
var hitData=null;

// Try exact drift match
for(var i=0;i<steps.length;i++){
  var drifted=steps[i].to;
  var matches=DRIFT_DATA.filter(function(d){return d.drift===drifted&&isSafeEntry(d);});
  if(matches.length>0){hitIndex=i;hitData=matches.find(function(m){return m.has_image;})||matches[0];break;}
}

// If no match from computed drift, use data's own drift for this word
if(hitIndex===-1 && byOriginal[word]){
  var drifts=byOriginal[word].filter(isSafeEntry);
  for(var i=0;i<steps.length;i++){
    var match=drifts.find(function(d){return d.drift===steps[i].to;});
    if(match){hitIndex=i;hitData=match;break;}
  }
  if(hitIndex===-1){
    hitData=drifts.find(function(d){return d.has_image;})||drifts[0];
    var dw=hitData.drift;
    for(var ci=0;ci<word.length&&ci<dw.length;ci++){
      if(word[ci]!==dw[ci]){
        steps=[{from:word,to:dw,pos:ci,old:word[ci],"new":dw[ci]}];
        hitIndex=0;break;
      }
    }
  }
}

var displaySteps=hitIndex>=0?steps.slice(0,hitIndex+1):steps;
var html='<div class="ds">';
for(var si=0;si<displaySteps.length;si++){
  var st=displaySteps[si];
  var fromC=st.from.split("").map(function(ch,ci){return ci===st.pos?'<span class="ch-old">'+ch+'</span>':'<span class="ch-d">'+ch+'</span>';}).join("");
  var toC=st.to.split("").map(function(ch,ci){return ci===st.pos?'<span class="ch-new">'+ch+'</span>':'<span class="ch-d">'+ch+'</span>';}).join("");
  html+='<div class="d-step" style="animation-delay:'+(si*0.6)+'s"><div class="d-row"><span class="d-lb">D-'+(si<9?'0':'')+(si+1)+'</span><span>'+fromC+'</span><span class="arr">\u2192</span><span>'+toC+'</span>';
  if(si===hitIndex)html+='<span class="hit">HIT</span>';
  html+='</div><div class="d-ex">\u9375\u76e4\u4e0a\u300c'+st.old+'\u300d\u7684\u76f8\u9130\u9375\u300c'+st["new"]+'\u300d\u53d6\u4ee3\u4e86\u7b2c '+(st.pos+1)+' \u500b\u5b57\u6bcd</div></div>';
}
html+='</div>';

if(hitData){
  var wikiLink='<div style="margin-top:16px;text-align:right;"><a href="https://en.wikipedia.org/wiki/'+encodeURIComponent(hitData.title)+'" target="_blank" rel="noopener" style="font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#000;text-decoration:underline;text-underline-offset:3px;">READ MORE ↗</a></div>';
  html+='<div class="arr-box"><div class="sig">SIGNAL FOUND</div><div class="at">'+escH(hitData.title)+'</div><div class="ad" id="wikiExtract"><span style="color:#bbb;font-style:italic">loading...</span></div><div class="img-area" id="imgArea"></div>'+wikiLink+'</div>';
  trail.push({input:word,drifted:hitData.drift,title:hitData.title});
}else{
  var lastW=steps.length>0?steps[steps.length-1].to:word;
  html+='<div class="arr-box"><div class="sig" style="color:#888">NO SIGNAL \u2014 GHOST WORD</div><div class="at" style="color:#666">'+escH(lastW)+'</div><div class="ghost">\u9019\u500b\u5b57\u4e32\u5728\u771f\u5be6\u4e16\u754c\u4e2d\u6c92\u6709\u627e\u5230\u5c0d\u61c9\u3002\u5b83\u662f\u9375\u76e4\u6f02\u79fb\u7522\u751f\u7684\u5e7d\u9748\u8a5e\u3002</div></div>';
  trail.push({input:word,drifted:lastW,title:null});
}

document.getElementById("content").innerHTML=html;
document.getElementById("btnArea").innerHTML='<button class="btn" onclick="resetDrift()">DRIFT AGAIN</button>';
renderTrail();
if(hitData){fetchExtract(hitData.title);if(hitData.has_image)fetchImg(hitData.title);}
}

function fetchExtract(title){
  var el=document.getElementById("wikiExtract");
  if(!el)return;
  if(fetchControllers.extract){fetchControllers.extract.abort();}
  var ctrl=new AbortController();
  fetchControllers.extract=ctrl;
  var apiUrl="https://en.wikipedia.org/w/api.php?action=query&titles="+encodeURIComponent(title)+"&prop=extracts&exintro=1&explaintext=1&format=json&origin=*&redirects=1";
  fetch(apiUrl,{signal:ctrl.signal})
  .then(function(r){return r.json();})
  .then(function(d){
    var pages=d.query&&d.query.pages;
    if(!pages)return;
    var keys=Object.keys(pages);
    var text="";
    for(var i=0;i<keys.length;i++){
      var p=pages[keys[i]];
      if(p.extract){text=p.extract.trim();break;}
    }
    if(text){
      // First non-empty paragraph only
      var paras=text.split(/\n+/).filter(function(s){return s.trim().length>0;});
      text=paras[0]||"";
    }
    if(el)el.textContent=text||"";
  })
  .catch(function(err){
    if(err&&err.name==='AbortError')return;
    // Fallback to DRIFT_DATA
    var entry=null;
    for(var i=0;i<DRIFT_DATA.length;i++){
      if(DRIFT_DATA[i].title===title){entry=DRIFT_DATA[i];break;}
    }
    var el2=document.getElementById("wikiExtract");
    if(el2)el2.textContent=(entry&&entry.extract)||"";
  });
}

function fetchImg(title){
var apiUrl="https://en.wikipedia.org/w/api.php?action=query&titles="+encodeURIComponent(title)+"&prop=pageimages&format=json&pithumbsize=800&origin=*&redirects=1";
if(fetchControllers.img){fetchControllers.img.abort();}
var ctrl=new AbortController();
fetchControllers.img=ctrl;
fetch(apiUrl,{signal:ctrl.signal})
.then(function(r){return r.json();})
.then(function(d){
  var pages=d.query&&d.query.pages;
  if(!pages)return;
  var keys=Object.keys(pages);
  for(var i=0;i<keys.length;i++){
    var p=pages[keys[i]];
    if(p.thumbnail&&p.thumbnail.source){
      var area=document.getElementById("imgArea");
      if(!area)return;
      // Safe DOM construction — no innerHTML with API data
      var wrap=document.createElement("div");
      wrap.className="img-wrap";
      var img=document.createElement("img");
      img.alt=title; // plain text, not HTML
      img.onload=function(){this.style.opacity=1;};
      img.onerror=function(){wrap.style.display="none";};
      img.src=p.thumbnail.source; // set last, triggers load
      var cap=document.createElement("div");
      cap.className="img-cap";
      cap.textContent=title;
      // Click to toggle grayscale → color
      wrap.addEventListener("click",function(){
        img.classList.toggle("color");
      });
      wrap.appendChild(img);
      wrap.appendChild(cap);
      area.appendChild(wrap);
      return;
    }
  }
})
.catch(function(err){if(err&&err.name==='AbortError')return;});
}

function resetDrift(){
document.getElementById("inp").value="";
document.getElementById("content").innerHTML="";
document.getElementById("btnArea").innerHTML='<button class="btn" onclick="startDrift()">DRIFT</button>';
document.getElementById("inp").focus();
}

function renderTrail(){
if(trail.length===0)return;
var box=document.getElementById("trailBox");
box.innerHTML="";
var wrap=document.createElement("div");
wrap.className="trail";
var lb=document.createElement("div");
lb.className="tl-lb";
lb.textContent="DRIFT LOG";
wrap.appendChild(lb);
for(var i=0;i<trail.length;i++){
  var e=trail[i];
  var row=document.createElement("div");
  row.className="te";
  var num=document.createElement("span");
  num.className="te-n";
  var n=i+1;
  num.textContent="#"+(n<10?"00":n<100?"0":"")+n;
  row.appendChild(num);
  var inp=document.createElement("span");
  inp.className="te-i";
  inp.textContent=e.input;
  row.appendChild(inp);
  var a1=document.createElement("span");
  a1.className="arr";
  a1.textContent="\u2192";
  row.appendChild(a1);
  var dr=document.createElement("span");
  dr.className="te-d";
  dr.textContent=e.drifted;
  row.appendChild(dr);
  if(e.title){
    var a2=document.createElement("span");
    a2.className="arr";
    a2.textContent="\u2192";
    row.appendChild(a2);
    var ti=document.createElement("span");
    ti.className="te-t";
    ti.textContent=e.title;
    row.appendChild(ti);
  }
  wrap.appendChild(row);
}
box.appendChild(wrap);
}

document.getElementById("inp").addEventListener("keydown",function(e){if(e.key==="Enter")startDrift();});
