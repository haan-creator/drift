<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIFT MACHINE — 漂流機器</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f2f0ec;
    color: #000;
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    animation: grain 8s steps(10) infinite;
    pointer-events: none; z-index: 1000;
  }

  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-2%, -2%); }
    30% { transform: translate(1%, -1%); }
    50% { transform: translate(-1%, 2%); }
    70% { transform: translate(3%, 1%); }
    90% { transform: translate(-2%, 1%); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .container {
    max-width: 620px;
    margin: 0 auto;
    padding: 80px 20px 80px;
    position: relative; z-index: 1;
  }

  /* Header */
  .header-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    font-weight: 700;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
  }
  .header-line {
    width: 100%; height: 3px;
    background: #000;
    margin-bottom: 16px;
  }
  .header-desc {
    font-size: 13px; color: #555;
    line-height: 1.7; max-width: 440px;
  }

  /* Input area */
  .input-area {
    margin-top: 48px;
    margin-bottom: 4px;
  }
  .input-row {
    display: flex; align-items: center;
    border-bottom: 2px solid #000;
    padding-bottom: 10px;
  }
  .input-label {
    font-size: 11px; color: #888;
    margin-right: 10px; font-weight: 700;
    letter-spacing: 0.1em; user-select: none;
  }
  .input-field {
    flex: 1; background: transparent;
    border: none; outline: none;
    color: #000; font-size: 20px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; letter-spacing: 0.02em;
  }
  .input-field::placeholder { color: #999; }

  .btn {
    background: #000; border: none;
    color: #f2f0ec; padding: 8px 24px;
    font-size: 11px; font-family: 'IBM Plex Mono', monospace;
    font-weight: 700; letter-spacing: 0.2em;
    cursor: pointer; text-transform: uppercase;
    margin-top: 12px;
  }

  /* Drift steps */
  .drift-steps { margin-top: 28px; }
  .drift-step {
    padding: 10px 0;
    border-bottom: 1px solid #1a1a1a;
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
  }
  .drift-step-row {
    display: flex; align-items: baseline; gap: 12px;
    font-size: 14px; letter-spacing: 0.1em;
  }
  .drift-label {
    color: #666; font-size: 10px;
    min-width: 48px; font-weight: 700;
    text-transform: uppercase;
  }
  .char-old { color: #cc0000; text-decoration: line-through; font-weight: 700; }
  .char-new { color: #cc0000; font-weight: 700; text-decoration: underline; text-underline-offset: 4px; text-decoration-color: #cc0000; }
  .char-dim { color: #888; }
  .arrow { color: #000; font-weight: 700; }
  .hit-badge {
    margin-left: auto; font-size: 9px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    border: 1px solid #000; padding: 2px 8px;
  }
  .drift-explain {
    margin-top: 4px; margin-left: 60px;
    font-size: 10px; color: #999; line-height: 1.5;
  }

  /* Arrival */
  .arrival {
    margin-top: 40px;
    border-top: 3px solid #000;
    padding-top: 24px;
    animation: fadeUp 0.8s ease forwards;
  }
  .signal-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.3em; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .arrival-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 700; line-height: 1.05;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .arrival-desc {
    font-size: 13px; line-height: 1.8;
    color: #333; margin-bottom: 20px;
    max-width: 560px;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
  .tag {
    font-size: 10px; font-weight: 700;
    padding: 4px 10px; border: 1px solid #000;
    letter-spacing: 0.15em; text-transform: uppercase;
    text-decoration: none; color: #000;
  }

  /* Translation */
  .translation {
    border-top: 1px solid #000;
    padding-top: 20px; margin-bottom: 20px;
  }
  .trans-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.3em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .trans-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px; font-weight: 700;
    line-height: 1.3; margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .trans-body {
    font-size: 14px; color: #333;
    line-height: 2; max-width: 540px;
  }

  /* Trail */
  .trail {
    margin-top: 48px; padding-top: 20px;
    border-top: 2px solid #000;
  }
  .trail-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.3em; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .trail-entry {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 12px; padding: 4px 0;
    border-bottom: 1px solid #e0e0e0;
    flex-wrap: wrap;
  }
  .trail-num { color: #aaa; font-size: 9px; font-weight: 700; }
  .trail-input { color: #888; }
  .trail-drifted { color: #000; font-weight: 600; }
  .trail-title { color: #444; font-weight: 500; }

  /* Ghost word */
  .ghost {
    font-size: 13px; color: #888; line-height: 1.8;
    font-style: italic; padding: 16px 0;
    border-top: 1px dashed #ccc;
  }

  /* Demo selector */
  .demo-selector {
    display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
  }
  .demo-btn {
    background: transparent; border: 1px solid #ccc;
    color: #888; padding: 6px 16px; font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.2s;
  }
  .demo-btn:hover, .demo-btn.active {
    border-color: #000; color: #000;
  }

  .hidden { display: none; }

  /* Responsive */
  @media (max-width: 480px) {
    .container { padding: 60px 16px 60px; }
    .header-title { font-size: clamp(36px, 12vw, 64px); }
    .arrival-title { font-size: clamp(24px, 7vw, 44px); }
    .drift-step-row { font-size: 13px; gap: 8px; }
    .tags { gap: 6px; }
    .tag { font-size: 9px; padding: 3px 8px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div>
    <div class="header-title">DRIFT<br>MACHINE</div>
    <div class="header-line"></div>
    <p class="header-desc">輸入你想搜尋的東西。手指與鍵盤之間的距離會帶你去別的地方。</p>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <span class="input-label">INPUT://</span>
      <input class="input-field" id="inputField" placeholder="type a word..." readonly>
    </div>
    <div class="demo-selector" id="demoSelector">
      <button class="demo-btn" onclick="showDemo('read')">read</button>
      <button class="demo-btn" onclick="showDemo('book')">book</button>
      <button class="demo-btn" onclick="showDemo('soup')">soup</button>
    </div>
  </div>

  <!-- Content area -->
  <div id="content"></div>

  <!-- Trail -->
  <div class="trail" id="trail" style="display:none">
    <div class="trail-label">DRIFT LOG</div>
    <div id="trailEntries"></div>
  </div>
</div>

<script>
const demos = {
  read: {
    input: "read",
    steps: [
      { from: "read", to: "rwad", pos: 1, old: "e", new: "w" },
    ],
    hitIndex: 0,
    result: {
      found: true,
      title: "Arabic word and multiple companies/brands",
      description: `Rwad (رواد) is an Arabic word meaning 'pioneers' or 'trailblazers'. It is commonly used as a business name across the Middle East, including Al-Rwad contracting companies in Saudi Arabia and Palestine, Rwad human resources consultancies in UAE, and an entrepreneurship club at Prince Mohammad Bin Fahd University.`,
      language: "ARABIC",
      location: "MIDDLE EAST (SAUDI ARABIA, UAE, PALESTINE, EGYPT)",
      url: null,
    },
    translation: {
      title: "Rwad——阿拉伯語詞彙與多家企業品牌",
      body: "Rwad（رواد）是一個阿拉伯語詞彙，意為「先鋒」或「領導者」。該名稱被中東地區的多家公司和組織採用，包括沙烏地阿拉伯（Saudi Arabia）、阿拉伯聯合大公國（UAE）、埃及（Egypt）、巴勒斯坦（Palestine）和以色列（Israel）的人力資源顧問公司、承包公司以及創業俱樂部等。"
    }
  },
  book: {
    input: "book",
    steps: [
      { from: "book", to: "hook", pos: 0, old: "b", new: "h" },
    ],
    hitIndex: 0,
    result: {
      found: true,
      title: "Hook - 1991 Steven Spielberg Film",
      description: `Hook is a 1991 fantasy adventure film directed by Steven Spielberg starring Robin Williams as an adult Peter Pan who must return to Neverland to rescue his children from Captain Hook. The film received five Academy Award nominations and has gained a cult following since its release.`,
      language: null,
      location: null,
      url: "https://en.wikipedia.org/wiki/Hook_(film)",
    },
    translation: {
      title: "Hook（鐵鉤船長）- 1991年Steven Spielberg（史蒂芬·史匹柏）電影",
      body: "Hook（鐵鉤船長）是一部1991年的奇幻冒險電影，由Steven Spielberg（史蒂芬·史匹柏）執導，Robin Williams（羅賓·威廉斯）主演，飾演成年後的Peter Pan（彼得潘），他必須返回Neverland（夢幻島）從Captain Hook（虎克船長）手中拯救自己的孩子。該片獲得五項Academy Award（奧斯卡金像獎）提名，自上映以來已累積了狂熱的追隨者群體。"
    }
  },
  soup: {
    input: "soup",
    steps: [
      { from: "soup", to: "zoup", pos: 0, old: "s", new: "z" },
    ],
    hitIndex: 0,
    result: {
      found: true,
      title: "Zoup! — American Fresh Soup Restaurant Chain",
      description: `Zoup! is an American restaurant chain specializing in fresh soups, founded in 1998 in Southfield, Michigan. The chain serves rotating daily soups along with salads and sandwiches, with locations primarily across the Midwestern and Eastern United States.`,
      language: null,
      location: "UNITED STATES (MICHIGAN, MIDWEST)",
      url: "https://zoup.com",
    },
    translation: {
      title: "Zoup!——美國鮮湯連鎖餐廳",
      body: "Zoup! 是一家美國連鎖餐廳，專門供應新鮮湯品，於1998年在密西根州（Michigan）的Southfield（紹斯菲爾德）創立。該連鎖店每日供應輪替的湯品，搭配沙拉和三明治，門市主要分布在美國中西部和東部地區。"
    }
  }
};

const trailLog = [];

function renderDriftStep(step, index, isHit) {
  const fromChars = step.from.split('').map((ch, ci) => {
    if (ci === step.pos) return `<span class="char-old">${ch}</span>`;
    return `<span class="char-dim">${ch}</span>`;
  }).join('');

  const toChars = step.to.split('').map((ch, ci) => {
    if (ci === step.pos) return `<span class="char-new">${ch}</span>`;
    return `<span class="char-dim">${ch}</span>`;
  }).join('');

  return `
    <div class="drift-step" style="animation-delay: ${index * 0.6}s">
      <div class="drift-step-row">
        <span class="drift-label">D-${String(index + 1).padStart(2, '0')}</span>
        <span>${fromChars}</span>
        <span class="arrow">→</span>
        <span>${toChars}</span>
        ${isHit ? '<span class="hit-badge">HIT</span>' : ''}
      </div>
      <div class="drift-explain">鍵盤上「${step.old}」的相鄰鍵「${step.new}」取代了第 ${step.pos + 1} 個字母</div>
    </div>
  `;
}

function renderArrival(data) {
  const r = data.result;
  const t = data.translation;

  let tagsHtml = '';
  if (r.language) tagsHtml += `<span class="tag">${r.language}</span>`;
  if (r.location) tagsHtml += `<span class="tag">${r.location}</span>`;
  if (r.url) tagsHtml += `<a class="tag" href="${r.url}" target="_blank">SOURCE ↗</a>`;

  return `
    <div class="arrival">
      <div class="signal-label">${r.found ? 'SIGNAL FOUND' : 'NO SIGNAL — GHOST WORD'}</div>
      ${r.title ? `<div class="arrival-title">${r.title}</div>` : ''}
      <div class="arrival-desc">${r.description}</div>
      ${tagsHtml ? `<div class="tags">${tagsHtml}</div>` : ''}
      ${t ? `
        <div class="translation">
          <div class="trans-label">翻譯</div>
          ${t.title ? `<div class="trans-title">${t.title}</div>` : ''}
          <div class="trans-body">${t.body}</div>
        </div>
      ` : ''}
    </div>
  `;
}

function showDemo(key) {
  const data = demos[key];
  if (!data) return;

  // Update input
  document.getElementById('inputField').value = data.input;

  // Update active button
  document.querySelectorAll('.demo-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  // Build content
  let html = '<div class="drift-steps">';
  data.steps.forEach((step, i) => {
    html += renderDriftStep(step, i, i === data.hitIndex);
  });
  html += '</div>';
  html += renderArrival(data);

  document.getElementById('content').innerHTML = html;

  // Update trail
  trailLog.push({
    input: data.input,
    drifted: data.steps[data.hitIndex].to,
    title: data.result.found ? data.result.title : null,
  });
  renderTrail();
}

function renderTrail() {
  if (trailLog.length === 0) return;
  document.getElementById('trail').style.display = 'block';

  let html = '';
  trailLog.forEach((e, i) => {
    html += `
      <div class="trail-entry">
        <span class="trail-num">#${String(i + 1).padStart(3, '0')}</span>
        <span class="trail-input">${e.input}</span>
        <span class="arrow">→</span>
        <span class="trail-drifted">${e.drifted}</span>
        ${e.title ? `<span class="arrow">→</span><span class="trail-title">${e.title}</span>` : ''}
      </div>
    `;
  });
  document.getElementById('trailEntries').innerHTML = html;
}
</script>

</body>
</html>
